version: "3"

services:
  nextjs:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: a1234
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: